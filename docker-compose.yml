services:
  postgres:
    image: postgres:16-alpine
    container_name: findash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-financial_dashboard}']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: findash-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-financial_dashboard}?schema=public
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_REQUEST_LOGGING: ${ENABLE_REQUEST_LOGGING:-true}
      MONITORING_API_KEY: ${MONITORING_API_KEY:-}
      IEX_CLOUD_API_KEY: ${IEX_CLOUD_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-7-sonnet-latest}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-20000}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1400}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.2}
      AI_INSIGHT_CACHE_TTL_SECONDS: ${AI_INSIGHT_CACHE_TTL_SECONDS:-900}
      STOCK_CACHE_TTL_SECONDS: ${STOCK_CACHE_TTL_SECONDS:-60}
      REDIS_REST_URL: ${REDIS_REST_URL:-}
      REDIS_REST_TOKEN: ${REDIS_REST_TOKEN:-}
    command: >
      sh -c "npx prisma migrate deploy --schema src/prisma/schema.prisma && node dist/server.js"
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://localhost:4000/api/health\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"']
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: findash-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/ > /dev/null || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
